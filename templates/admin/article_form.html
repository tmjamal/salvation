{% extends 'admin/base.html' %}
{% block title %}{{ 'ലേഖനം തിരുത്തുക' if article else 'ലേഖനം ചേർക്കുക' }}{% endblock %}
{% block admin_content %}
<div class="admin-page-header">
    <h1>📰 {{ 'ലേഖനം തിരുത്തുക' if article else 'പുതിയ ലേഖനം' }}</h1>
    <a href="{{ url_for('admin_articles') }}" class="btn btn-sm btn-secondary">← തിരികെ</a>
</div>
<form method="post" class="admin-form">
    <div class="form-group"><label>വിഭാഗം</label>
        <select name="category_id">
            <option value="">തിരഞ്ഞെടുക്കുക</option>
            {% for c in categories %}<option value="{{ c.id }}" {{ 'selected' if article and article.category_id==c.id
                }}>{{ c.name_ml }}</option>{% endfor %}
        </select>
    </div>
    <div class="form-group"><label>മലയാളം ശീർഷകം *</label><input type="text" name="title_ml"
            value="{{ article.title_ml if article else '' }}" required></div>
    <div class="form-row">
        <div class="form-group"><label>സ്ലഗ് *</label><input type="text" name="slug"
                value="{{ article.slug if article else '' }}" required></div>
        <div class="form-group"><label>രചയിതാവ്</label><input type="text" name="author"
                value="{{ article.author if article else '' }}"></div>
        <div class="form-group"><label>ചിത്രം URL</label><input type="url" name="image_url"
                value="{{ article.image_url if article else '' }}" placeholder="https://example.com/image.jpg"></div>
    </div>
    <div class="form-group"><label>സംഗ്രഹം</label><textarea name="summary_ml"
            style="min-height: 100px;">{{ article.summary_ml if article else '' }}</textarea></div>
    <div class="form-group"><label>മുഴുവൻ ഉള്ളടക്കം (HTML) *</label><textarea name="content_ml"
            style="min-height: 400px;" required>{{ article.content_ml if article else '' }}</textarea></div>
    <div class="form-check"><input type="checkbox" name="is_featured" id="featured" {{ 'checked' if article and
            article.is_featured }}><label for="featured">ഫീച്ചർഡ് ലേഖനം</label></div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">{{ 'അപ്ഡേറ്റ്' if article else 'ചേർക്കുക' }}</button>
        <a href="{{ url_for('admin_articles') }}" class="btn btn-secondary">റദ്ദാക്കുക</a>
    </div>
</form>
{% endblock %}
