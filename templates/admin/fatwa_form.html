{% extends 'admin/base.html' %}
{% block title %}{{ 'ഫത്‍വ തിരുത്തുക' if fatwa else 'ഫത്‍വ ചേർക്കുക' }}{% endblock %}
{% block admin_content %}
<div class="admin-page-header">
    <h1>⚖️ {{ 'ഫത്‍വ തിരുത്തുക' if fatwa else 'പുതിയ ഫത്‍വ' }}</h1>
    <a href="{{ url_for('admin_fatwas') }}" class="btn btn-sm btn-secondary">← തിരികെ</a>
</div>
<form method="post" class="admin-form">
    <div class="form-row">
        <div class="form-group"><label>വിഭാഗം</label><input type="text" name="category"
                value="{{ fatwa.category if fatwa else '' }}"></div>
        <div class="form-group"><label>പണ്ഡിതൻ</label><input type="text" name="scholar"
                value="{{ fatwa.scholar if fatwa else '' }}"></div>
    </div>
    <div class="form-group"><label>ചോദ്യം (മലയാളം) *</label><textarea name="question_ml"
            required>{{ fatwa.question_ml if fatwa else '' }}</textarea></div>
    <div class="form-group"><label>ഉത്തരം (മലയാളം) *</label><textarea name="answer_ml" style="min-height: 300px;"
            required>{{ fatwa.answer_ml if fatwa else '' }}</textarea></div>
    <div class="form-check"><input type="checkbox" name="is_featured" id="featured" {{ 'checked' if fatwa and
            fatwa.is_featured }}><label for="featured">ഫീച്ചർഡ്</label></div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">{{ 'അപ്ഡേറ്റ്' if fatwa else 'ചേർക്കുക' }}</button>
        <a href="{{ url_for('admin_fatwas') }}" class="btn btn-secondary">റദ്ദാക്കുക</a>
    </div>
</form>
{% endblock %}
